<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print & Craft Raffle Promo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎉 PRINT & CRAFT</h1>
    <p>RAFFLE PROMO 2026</p>
</header>

<section class="countdown-section">
    <h2>Raffle Draw Countdown</h2>
    <div id="countdown"></div>
</section>

<section class="raffle-form">
    <h2>Enter Your Coupon</h2>

    <input type="text" id="name" placeholder="Full Name">

    <input type="text" id="contact" placeholder="Contact Number">

    <input type="text" id="coupon" placeholder="Coupon Code">

    <button onclick="submitEntry()">Submit Entry</button>

    <p id="message"></p>
</section>

<footer>
    © 2026 Print & Craft
</footer>

<script src="script.js"></script>

</body>
</html>
