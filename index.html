```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print & Craft Raffle Promo</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<header class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>PRINT & CRAFT</h1>

<p class="tagline">
Every order gives you a chance to win!
</p>

<div class="prizes">

<div class="prize-card">
<div class="icon">🏆</div>
<h2>Grand Winner</h2>
<p>20 Polaroid Prints</p>
</div>

<div class="prize-card">
<div class="icon">🎉</div>
<h2>2 Winners</h2>
<p>10 Polaroid Prints Each</p>
</div>

</div>

</div>

</header>

<section class="countdown-section">

<h2>Raffle Draw Countdown</h2>

<div class="countdown">

<div class="time-box">
<span id="days">0</span>
<p>Days</p>
</div>

<div class="time-box">
<span id="hours">0</span>
<p>Hours</p>
</div>

<div class="time-box">
<span id="minutes">0</span>
<p>Minutes</p>
</div>

<div class="time-box">
<span id="seconds">0</span>
<p>Seconds</p>
</div>

</div>

</section>

<section class="entry-section">

<div class="form-card">

<h2>🎟 Enter Your Coupon</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="contact" placeholder="Contact Number">

<input type="text" id="coupon" placeholder="Coupon Code">

<button onclick="submitEntry()">
Submit Entry
</button>

<p id="message"></p>

</div>

</section>

<footer>

<p>© 2026 Print & Craft</p>

</footer>

<script>

const drawDate =
new Date("December 31, 2026 18:00:00").getTime();

setInterval(() => {

const now = new Date().getTime();

const distance = drawDate - now;

document.getElementById("days").innerHTML =
Math.floor(distance / (1000*60*60*24));

document.getElementById("hours").innerHTML =
Math.floor((distance%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutes").innerHTML =
Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("seconds").innerHTML =
Math.floor((distance%(1000*60))/1000);

},1000);

function submitEntry(){

const name =
document.getElementById("name").value;

const contact =
document.getElementById("contact").value;

const coupon =
document.getElementById("coupon").value;

if(!name || !contact || !coupon){

document.getElementById("message").innerHTML =
"❌ Please fill in all fields.";

return;
}

document.getElementById("message").innerHTML =
"✅ Entry Submitted Successfully!";
}

</script>

</body>
</html>
```
